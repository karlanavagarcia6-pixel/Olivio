<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="icon" href="Imagenes/logo.jpg" type="image/jpg">

    <!-- Tus CSS -->
    <link rel="stylesheet" href="CSS/global.css">
    <link rel="stylesheet" href="CSS/header.css">
    <link rel="stylesheet" href="CSS/home.css">
    <link rel="stylesheet" href="CSS/footer.css">
</head>

<header>
    <div class="container header-expand">
        <div class="container-logo">
            <img src="Imagenes/logo.jpg" alt="Logo">
            <span>Olivio</span>
        </div>
    </div>
</header>

<body>



<!-- CONTACTO -->
<section class="contacto-page">
    <div class="contacto-container">
        <h1 class="titulo-contacto">Contáctanos</h1>
        
        <form class="formulario-contacto">
            <input type="text" placeholder="Tu nombre">
            <input type="email" placeholder="Tu correo">
            <textarea rows="5" placeholder="Tu mensaje"></textarea>
            <button type="submit" class="btn-contacto">Enviar</button>
        </form>

        <!-- Botón volver -->
        <div class="volver-btn">
            <a href="index.html" class="btn-volver">← Volver al inicio</a>
        </div>
    </div>
</section>
